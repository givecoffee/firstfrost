name: ESLint Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eslint:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install SARIF formatter
        run: npm install @microsoft/eslint-formatter-sarif --save-dev

      - name: Debug - Check setup
        run: |
          echo "=== ESLint Version ==="
          npx eslint --version
          echo "=== Config files ==="
          ls -la .eslint* 2>/dev/null || echo "No .eslint config found"
          ls -la eslint.config.* 2>/dev/null || echo "No eslint.config file found"
          echo "=== Package.json ESLint section ==="
          cat package.json | grep -A 10 eslint || echo "No eslint in package.json"
          echo "=== All files in root ==="
          ls -la

      - name: Run ESLint scanning
        run: |
          npx eslint . \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif
        continue-on-error: true

      - name: Check if SARIF was created
        run: |
          ls -la eslint-results.sarif 2>/dev/null || echo "SARIF file was NOT created"
        if: always()

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
