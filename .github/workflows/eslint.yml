name: ESLint

on:
  push:
    branches: [ "main", "chore-fixlinter" ]
  pull_request:
    branches: [ "main" ]

jobs:
  eslint:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      #  Generate SARIF file separately
      - name: Run ESLint and generate SARIF
        run: |
          npx eslint src/ \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif || true
        continue-on-error: true

      # Create empty SARIF if file missing
      - name: Create empty SARIF if missing
        run: |
          if [ ! -f eslint-results.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > eslint-results.sarif
          fi

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
